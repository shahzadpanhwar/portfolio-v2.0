<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Shahzad Panhwar | Software Engineer</title>

    <meta name="description" content="Portfolio of Shahzad Panhwar - Software Engineering Student, Frontend Developer and AI Enthusiast.">

    <!-- Google Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="stylesheet" href="assets/css/responsive.css">

</head>

<body>

    <!-- Canvas Background -->
    <canvas id="network-bg"></canvas>

<!-- ==========================
     AI ASSISTANT
========================== -->

<div class="ai-container">

    <div class="ai-chat">

        <div class="ai-header">

            <div>

                <h3>Shahzad AI</h3>

                <span>Online</span>

            </div>

            <button class="close-ai">
                <i class="fas fa-times"></i>
            </button>

        </div>

        <div class="ai-messages">

    <div class="ai-message">

        👋 Hello! I'm Shahzad's AI assistant.

        <br><br>

        Ask me anything about Shahzad.

    </div>

    <div class="suggestions">

        <button>About Shahzad</button>

        <button>Skills</button>

        <button>Projects</button>

        <button>Resume</button>

    </div>

</div>

        <div class="ai-input">

            <input
                type="text"
                placeholder="Ask something..."
            >

            <button>

                <i class="fas fa-paper-plane"></i>

            </button>

        </div>

    </div>

    <button class="ai-button">

        <i class="fas fa-robot"></i>

    </button>

</div>

    <!-- Hero -->
<section id="home" class="hero">

    <div class="hero-content">

        <div class="hero-image">

            <img src="assets/images/profile.png" alt="Shahzad Panhwar">

        </div>

        <p class="hero-tag">
            SOFTWARE ENGINEER • AI ENTHUSIAST
        </p>

        <h1>
            Shahzad Panhwar
        </h1>

        <p class="hero-description">
            Building intelligent software and modern web experiences with clean design and powerful technology.
        </p>

        <div class="hero-buttons">

            <a href="#projects" class="primary-btn">
                Explore My Work
            </a>

            <a href="assets/resume/resume.pdf" class="secondary-btn" download>
                Resume
            </a>

        </div>

        <div class="scroll-indicator">
            ↓ Scroll
        </div>

    </div>

</section>

    <!-- About -->
    <section id="about"></section>

    <!-- Skills -->
    <section id="skills"></section>

    <!-- Projects -->
    <section id="projects"></section>

    <!-- Resume -->
    <section id="resume"></section>

    <!-- Contact -->
    <section id="contact"></section>

    <!-- Footer -->
    <footer></footer>

    <!-- Scripts -->
    <script src="assets/js/main.js"></script>
    <script src="assets/js/background.js"></script>
    <script src="assets/js/animations.js"></script>
    <script src="assets/js/knowledge.js"></script>
    <script src="assets/js/ai.js"></script>

</body>

</html>
